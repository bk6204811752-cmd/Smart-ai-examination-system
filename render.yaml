services:
  - type: web
    name: pcmt-ai-exam-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOW_IN_MEMORY_DB
        value: "false"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: APP_NAME
        value: "PCMT Smart AI Exam System"
      - key: APP_VERSION
        value: "2.0.0"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: PROCTORING_ENABLED
        value: "true"
      - key: FACE_DETECTION_INTERVAL
        value: "2"
      - key: MIN_TRUST_SCORE
        value: "60"
      - key: COLLEGE_NAME
        value: "Pailan College of Management and Technology"
      - key: COLLEGE_CODE
        value: PCMT
      - key: TOTAL_STUDENTS
        value: "6000"
      - key: TOTAL_TEACHERS
        value: "250"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: OTP_EXPIRE_MINUTES
        value: "10"
      - key: OTP_LENGTH
        value: "6"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: "https://pcmt-ai-exam-system.vercel.app"
      - key: ADMIN_EMAIL
        value: "bk6204811752@gmail.com"
      - key: DATABASE_NAME
        value: "pcmt_exam"
      # ── SECRETS: Set these manually in Render Dashboard → Environment ──────
      # Go to: https://dashboard.render.com/web/srv-d960md0js32c7397pmn0/env
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
